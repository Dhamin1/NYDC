<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — NYDC 2026</title>
    <meta name="description" content="Register for the National Youth Development Conference 2026">
    <link rel="stylesheet" href="registration.css">
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>

    <!-- Decorative Frame -->
    <div class="border-frame"></div>

    <!-- Grainy Side Borders -->
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 POWERED BY GENSPARK</p>
    </div>

    <!-- Registration Form -->
    <main class="registration-wrapper">
        <div class="registration-card">

            <!-- Header -->
            <div class="card-header">
                <span class="card-tag">July 2026 • Delhi NCR</span>
                <h1>Register for <span>NYDC</span></h1>
                <p class="card-subtitle">
                    <span class="pulse-dot"></span>
                    &nbsp; Registrations Open
                </p>
            </div>

            <div class="divider"></div>

            <!-- Form -->
            <form id="registration-form" action="#" method="POST">

                <!-- Name Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first_name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last_name" placeholder="Doe" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <!-- Phone & School -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
                    </div>
                    <div class="form-group">
                        <label for="school">School / Institution</label>
                        <input type="text" id="school" name="school" placeholder="Your school name" required>
                    </div>
                </div>

                <!-- Grade & City -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="grade">Grade / Year</label>
                        <select id="grade" name="grade" required>
                            <option value="" disabled selected>Select grade</option>
                            <option value="8">Grade 8</option>
                            <option value="9">Grade 9</option>
                            <option value="10">Grade 10</option>
                            <option value="11">Grade 11</option>
                            <option value="12">Grade 12</option>
                            <option value="college">College</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="New Delhi" required>
                    </div>
                </div>

                <!-- Events Selection -->
                <div class="form-group">
                    <span class="events-label">Preferred Events</span>
                    <div class="events-grid">
                        <div class="event-check">
                            <input type="checkbox" id="ev-mun" name="events" value="mun">
                            <label for="ev-mun">Model United Nations</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-hack" name="events" value="hackathon">
                            <label for="ev-hack">Hackathon</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-moot" name="events" value="moot_court">
                            <label for="ev-moot">Moot Court</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-debate" name="events" value="debate">
                            <label for="ev-debate">Debate</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-spark" name="events" value="spark_tank">
                            <label for="ev-spark">Spark Tank</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-mktg" name="events" value="marketing">
                            <label for="ev-mktg">Marketing</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-trade" name="events" value="paper_trading">
                            <label for="ev-trade">Paper Trading</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-film" name="events" value="film_making">
                            <label for="ev-film">Film Making</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-raag" name="events" value="raag_jaam">
                            <label for="ev-raag">Raag Jaam</label>
                        </div>
                        <div class="event-check">
                            <input type="checkbox" id="ev-poetry" name="events" value="poetry">
                            <label for="ev-poetry">Poetry</label>
                        </div>
                    </div>
                </div>

                <!-- Experience -->
                <div class="form-group">
                    <label for="experience">Prior Experience (optional)</label>
                    <textarea id="experience" name="experience" placeholder="Tell us about any relevant MUN, debate, or hackathon experience…"></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">Register Now</button>
            </form>

            <p class="form-footer">
                By registering, you agree to our <a href="#">Terms &amp; Conditions</a>.
            </p>
        </div>
    </main>

    <!-- Firebase Integration -->
    <script type="module" src="firebase.js"></script>

</body>
</html>
