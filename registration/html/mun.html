<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Committee — NYDC 2026</title>
    <meta name="description" content="Select your committees and portfolios for MUN">
    <link rel="stylesheet" href="../css/registration.css">
    <link rel="stylesheet" href="../css/mun.css">
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>
    <div class="border-frame"></div>
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 POWERED BY GENSPARK</p>
    </div>

    <main class="registration-wrapper mun-wrapper">
        <div class="registration-card mun-card">

            <!-- Back Link -->
            <a href="event.html" class="back-link">← Back to Events</a>

            <!-- Header -->
            <div class="card-header">
                <span class="card-tag">Model United Nations</span>
                <h1>Select <span>Portfolios</span></h1>
                <p class="card-subtitle greeting">
                    Choose <strong>exactly 1 portfolio</strong> from the committees below.
                </p>
                <div class="selection-status">
                    <span id="select-count">0</span> / 1 Selected
                </div>
            </div>

            <div class="divider"></div>

            <!-- Committees Grid -->
            <div class="committees-container" id="committees-container">
                <!-- Committees injected by JS -->
            </div>

            <!-- Submit -->
            <button type="button" class="submit-btn" id="mun-submit-btn" disabled>Continue to Team Details →</button>

            <!-- Step Indicator -->
            <p class="step-indicator">Step 2.5 of 3 — Committee Selection</p>
        </div>
    </main>

    <!-- Guard: redirect if no personal/event data -->
    <script>
      const storedPersonal = sessionStorage.getItem('nydc_registration');
      const storedEvent = sessionStorage.getItem('nydc_event');
      if (!storedPersonal || !storedEvent) {
        window.location.href = '../registration.html';
      }
    </script>

    <script src="../js/mun.js"></script>
</body>
</html>
