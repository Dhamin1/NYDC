<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Events — NYDC 2026</title>
    <meta name="description" content="Choose your preferred events for the National Youth Development Conference 2026">
    <link rel="stylesheet" href="../css/registration.css">
    <link rel="icon" href="../../NYDC-Final-main/images/nydc-logo.png" type="image/png" />
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>

    <!-- Decorative Frame -->
    <div class="border-frame"></div>

    <!-- Grainy Side Borders -->
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 POWERED BY GENSPARK</p>
    </div>

    <!-- Event Selection Form -->
    <main class="registration-wrapper">
        <div class="registration-card">

            <!-- Back Link -->
            <a href="../registration.html" class="back-link" id="back-link">← Back</a>
            <a href="../../index.html" class="back-link" style="margin-left:16px;">🏠 Main Page</a>

            <!-- Header -->
            <div class="card-header">
                <span class="card-tag">July 2026 • Delhi NCR</span>
                <h1>Choose Your <span>Events</span></h1>
                <p class="card-subtitle greeting" id="user-greeting">
                    <!-- Filled by JS -->
                </p>
            </div>

            <div class="divider"></div>

            <!-- Form -->
            <form id="event-form" action="#" method="POST">

                <!-- Events Selection -->
                <div class="form-group">
                    <span class="events-label">Preferred Events</span>
                    <div class="events-grid">
                        <div class="event-check">
                            <input type="radio" id="ev-mun" name="events" value="mun">
                            <label for="ev-mun">Model United Nations &nbsp;(&#8377;1699) <span class="event-duration">2 Days</span></label>
                        </div>               
                        <div class="event-check">
                            <input type="radio" id="ev-moot" name="events" value="moot_court">
                            <label for="ev-moot">Moot Court &nbsp;(&#8377;3499) <span class="event-duration">2 Days</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-debate" name="events" value="debate">
                            <label for="ev-debate">Conventional Debate &nbsp;(&#8377;1599) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-spark" name="events" value="spark_tank">
                            <label for="ev-spark">Spark Tank &nbsp;(&#8377;3199) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-mktg" name="events" value="marketing">
                            <label for="ev-mktg">Marketing &nbsp;(&#8377;999) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-trade" name="events" value="paper_trading">
                            <label for="ev-trade">Paper Trading &nbsp;(&#8377;1199) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-film" name="events" value="film_making">
                            <label for="ev-film">Film Making &nbsp;(&#8377;2999) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="Navras" name="events" value="Navras">
                            <label for="Navras">Navras &nbsp;(&#8377;1499) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-poetry" name="events" value="poetry">
                            <label for="ev-poetry">Poetry &nbsp;(&#8377;999) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-raag" name="events" value="raag_jaam">
                            <label for="ev-raag">Raag Jaam &nbsp;(&#8377;3999) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check">
                            <input type="radio" id="ev-ipl" name="events" value="ipl">
                            <label for="ev-ipl">IPL Auction &nbsp;(&#8377;2999) <span class="event-duration">1 Day</span></label>
                        </div>
                        <div class="event-check" style="opacity:0.5;pointer-events:none;position:relative;">
                            <input type="radio" id="ev-hack" name="events" value="hackathon" disabled>
                            <label for="ev-hack">Hackathon<span class="event-duration">1 Day(24 Hours)</span> <span style="background:#8b1a1a;color:#fff;font-size:10px;padding:2px 10px;border-radius:9999px;margin-left:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Coming Soon</span></label>
                        </div>
                    </div>
                </div>

                <!-- Experience -->
                <div class="form-group">
                    <label for="experience">Prior Experience (optional)</label>
                    <textarea id="experience" name="experience" placeholder="Tell us about any relevant MUN, debate, or hackathon experience…"></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">Continue to Team →</button>
            </form>

            <!-- Step Indicator -->
            <p class="step-indicator">Step 2 of 3 — Event Selection</p>
        </div>
    </main>

    <!-- Guard: redirect if no personal data -->
    <script>
      const stored = sessionStorage.getItem('nydc_registration');
      if (!stored) {
        window.location.href = '../registration.html';
      } else {
        const personal = JSON.parse(stored);
        document.getElementById('user-greeting').innerHTML =
          'Welcome, <strong>' + personal.firstName + '</strong> — pick the event you\'d like to attend';
      }

      // Save selected event & redirect to team page
      const form = document.getElementById('event-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const selected = document.querySelector('input[name="events"]:checked');
        if (!selected) {
          alert('Please select an event to continue.');
          return;
        }
        // Save event choice + experience
        const eventData = {
          event: selected.value,
          experience: document.getElementById('experience').value.trim()
        };
        sessionStorage.setItem('nydc_event', JSON.stringify(eventData));

        // Route MUN to the committee selection page, otherwise to team selection
        if (selected.value === 'mun') {
          window.location.href = 'mun.html';
        } else {
          window.location.href = 'selection.html';
        }
      });
    </script>

</body>
</html>
