<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — NYDC 2026</title>
    <meta name="description" content="View all NYDC 2026 registrations">
    <link rel="stylesheet" href="../css/registration.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" href="../../NYDC-Final-main/images/nydc-logo.png" type="image/png" />
</head>
<body>

    <!-- Background Ambience -->
    <div class="bg-ambience"></div>
    <div class="border-frame"></div>
    <div class="grainy-border-left"></div>
    <div class="grainy-border-right"></div>

    <!-- Top Banner -->
    <div class="top-banner">
        <p>NYDC 2026 ADMIN SECURE DASHBOARD</p>
    </div>

    <!-- Main Content -->
    <main class="registration-wrapper admin-wrapper">

        <!-- 1. LOGIN GATE (Shown if not logged in) -->
        <div class="registration-card profile-card" id="login-section" style="display: none;">
            <div class="card-header">
                <span class="card-tag">Admin Access</span>
                <h1>Secure <span>Login</span></h1>
                <p class="card-subtitle">Authorized personnel only</p>
            </div>

            <div class="divider"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Admin Email</label>
                    <input type="email" id="login-email" required placeholder="admin@nydc.com">
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="Enter password">
                        <button type="button" class="password-toggle" data-target="login-password" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <p class="password-error" id="login-error"></p>
                </div>

                <button type="submit" class="submit-btn" id="login-btn">Log In →</button>
            </form>
        </div>

        <!-- 2. LOADING STATE -->
        <div class="registration-card profile-card" id="loading-section">
            <div class="center-content">
                <div class="spinner"></div>
                <p id="loading-text">Authenticating...</p>
            </div>
        </div>

        <!-- 3. DASHBOARD (Shown when logged in as admin) -->
        <div class="admin-dashboard card-glass" id="dashboard-section" style="display: none;">
            
            <div class="dashboard-header">
                <div>
                    <h1>Registration <span>Data</span></h1>
                    <p class="admin-subtitle">Total Registrations: <strong id="total-count">0</strong></p>
                </div>
                <div class="dashboard-actions">
                    <input type="text" id="search-input" class="search-box" placeholder="Search by name, email, or event...">
                    <button type="button" class="logout-btn-header" id="logout-btn">Log Out</button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Registrant</th>
                            <th>Contact</th>
                            <th>School/Grade</th>
                            <th>Event</th>
                            <th>Details (Team/MUN)</th>
                            <th>Reg. Date</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
